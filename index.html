<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Scanner เบิกวัสดุ</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: #f0f4f8;
      color: #334155;
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 20px;
    }
    .container {
      width: 100%; max-width: 480px;
      background: white;
      border-radius: 20px;
      padding: 30px 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      text-align: center;
    }
    h2 { font-size: 1.5em; color: #1e293b; margin-bottom: 20px; }
    
    .btn {
      width: 100%; padding: 15px; border: none; border-radius: 12px;
      font-size: 16px; font-weight: 600; font-family: 'Sarabun', sans-serif;
      cursor: pointer; transition: all 0.3s ease; margin-bottom: 15px;
    }
    .btn-start { background: linear-gradient(135deg, #10b981, #059669); color: white; box-shadow: 0 4px 15px rgba(16,185,129,0.3); }
    .btn-stop { background: #ef4444; color: white; display: none; }
    
    .video-wrapper {
      position: relative; width: 100%; border-radius: 16px; overflow: hidden;
      background: #0f172a; margin-bottom: 20px; display: none;
    }
    video { width: 100%; display: block; object-fit: cover; }
    .scan-line {
      position: absolute; left: 0; right: 0; top: 10%; height: 2px;
      background: #34d399; box-shadow: 0 0 15px #34d399;
      animation: scan 2s infinite linear;
    }
    @keyframes scan { 0% { top: 10%; } 50% { top: 90%; } 100% { top: 10%; } }
    #canvasElement { display: none; }

    #statusBox {
      padding: 15px; border-radius: 12px; display: none; font-size: 0.95em; line-height: 1.6; text-align: left;
    }
    .status-header { font-size: 1.1em; font-weight: bold; text-align: center; margin-bottom: 8px; }
    .loading { background: #f1f5f9; color: #475569; text-align: center !important; }
    .success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
    .error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; text-align: center !important; }
    
    .data-row { display: flex; justify-content: space-between; border-bottom: 1px dashed rgba(0,0,0,0.1); padding: 4px 0; }
    .data-label { font-weight: 600; color: #047857; }
  </style>
</head>
<body>

<div class="container">
  <h2>📦 ระบบสแกนเบิกวัสดุ</h2>

  <button id="btnStart" class="btn btn-start" onclick="startCamera()">📷 เปิดกล้องสแกน</button>
  <button id="btnStop" class="btn btn-stop" onclick="stopCamera()">🛑 ปิดกล้อง</button>

  <div class="video-wrapper" id="videoWrapper">
    <div class="scan-line"></div>
    <video id="video" playsinline></video>
  </div>
  <canvas id="canvasElement"></canvas>

  <div id="statusBox"></div>
</div>

<script>
  // ==========================================================
  // API URL ดึงมาจากไฟล์ที่คุณแนบมาให้เรียบร้อยแล้วครับ
  // ==========================================================
  const API_URL = "https://script.google.com/macros/s/AKfycbxgHYyJZKf33ITQ7Q4B8lwCE20EkQL9LdY5hUSxWUCcXZZgh7aZSmqmEJHa2QITcZZ__w/exec";

  const video = document.getElementById('video');
  const canvasElement = document.getElementById('canvasElement');
  const canvas = canvasElement.getContext('2d');
  const btnStart = document.getElementById('btnStart');
  const btnStop = document.getElementById('btnStop');
  const videoWrapper = document.getElementById('videoWrapper');
  const statusBox = document.getElementById('statusBox');

  let scanning = false;
  let stream = null;

  async function startCamera() {
    statusBox.style.display = 'none';
    try {
      // ขออนุญาตกล้อง 1 ครั้ง เบราว์เซอร์จะจำค่าไว้สำหรับเว็บนี้
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
      video.srcObject = stream;
      video.setAttribute("playsinline", true);
      video.play();
      
      videoWrapper.style.display = 'block';
      btnStart.style.display = 'none';
      btnStop.style.display = 'block';
      
      scanning = true;
      requestAnimationFrame(tick);
    } catch (err) {
      showStatus(`❌ ไม่สามารถเข้าถึงกล้องได้<br><small>${err.message}</small>`, "error");
    }
  }

  function stopCamera() {
    scanning = false;
    if (stream) {
      stream.getTracks().forEach(track => track.stop());
    }
    videoWrapper.style.display = 'none';
    btnStart.style.display = 'block';
    btnStop.style.display = 'none';
  }

  function tick() {
    if (!scanning) return;
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvasElement.height = video.videoHeight;
      canvasElement.width = video.videoWidth;
      canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
      
      const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height, {
        inversionAttempts: "dontInvert",
      });

      if (code) {
        stopCamera(); // ปิดกล้องทันทีเมื่อสแกนสำเร็จ
        sendDataToGoogleSheet(code.data);
        return;
      }
    }
    requestAnimationFrame(tick);
  }

  async function sendDataToGoogleSheet(qrData) {
    showStatus(`<div class="status-header">⏳ กำลังตรวจสอบข้อมูล...</div>รหัสที่สแกน: ${qrData}`, "loading");

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ qrData: qrData }) 
      });
      
      const result = await response.json();

      if (result.success) {
        // นำข้อมูล C,D,E,F มาจัดรูปแบบใบเสร็จให้อ่านง่าย
        const htmlContent = `
          <div class="status-header">✅ ${result.message}</div>
          <div class="data-row"><span class="data-label">รหัส QR:</span> <span>${qrData}</span></div>
          <div class="data-row"><span class="data-label">รายการ:</span> <span>${result.data.detail}</span></div>
          <div class="data-row"><span class="data-label">จำนวน:</span> <span>${result.data.qty} ${result.data.unit}</span></div>
          <div class="data-row" style="border:none;"><span class="data-label">ราคา:</span> <span>${result.data.price} บาท</span></div>
        `;
        showStatus(htmlContent, "success");
      } else {
        showStatus(`<div class="status-header">❌ ${result.message}</div>รหัสที่สแกน: ${qrData}`, "error");
      }
    } catch (error) {
      showStatus(`<div class="status-header">❌ เชื่อมต่อล้มเหลว</div>กรุณาตรวจสอบการตั้งค่าสิทธิ์ API`, "error");
    }
  }

  function showStatus(message, className) {
    statusBox.innerHTML = message;
    statusBox.className = className;
    statusBox.style.display = 'block';
  }
</script>

</body>
</html>
